# netlify.toml — 1Commerce LLC · OnPoint Starter Facility Proposal

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
    Content-Security-Policy    = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'"
    X-Robots-Tag               = "noindex, nofollow, noarchive"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[redirects]]
  from   = "/index"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301
